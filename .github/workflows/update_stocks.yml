name: Update Stock Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run update script
        run: python update_stocks.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull origin main
          git add weight/*.json
          git diff --cached --quiet || git commit -m "Auto-update stock data $(date +'%Y-%m-%d')"
          git push

          
